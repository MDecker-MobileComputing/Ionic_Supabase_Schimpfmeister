<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Schimpfmeister</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">Schimpfmeister</ion-title>
    </ion-toolbar>
  </ion-header>

  <div class="content-wrapper">
    <div class="schimpfwort-card" *ngIf="!fehlerNachricht; else fehlerTemplate">
      <p class="wort zeile-adjektiv"  >{{ adjektiv }}</p>
      <p class="wort zeile-substantiv">{{ substantiv }}</p>
    </div>

    <ng-template #fehlerTemplate>
      <div class="schimpfwort-card fehler-card">
        <p class="fehler-text">{{ fehlerNachricht }}</p>
      </div>
    </ng-template>

    <ion-button
      expand="block"
      size="large"
      (click)="schimpfwortLaden()"
      [disabled]="istAmLaden"
    >
      {{ istAmLaden ? "Lade..." : "Neue Laden" }}
    </ion-button>
  </div>
</ion-content>
